<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KevinScale — Résultats</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div id="ks-header-placeholder"></div>

<main class="page-content">
<div class="results-wrap">

  <p class="results-intro">
    Votre résultat KevinScale est décomposé en <strong>8 axes</strong>.
    Chaque barre indique votre proximité idéologique avec Kévin de 0 à 100%.
  </p>

  <!-- Score global -->
  <div class="global-score-block">
    <div class="global-score-num">
      <span id="global-score">—</span><span class="global-score-unit">%</span>
    </div>
    <span class="global-score-lbl">de proximité idéologique avec Kévin</span>
  </div>

  <!-- Verdict -->
  <div class="verdict-block">
    <div class="verdict-title" id="verdict-title"></div>
    <div class="verdict-text"  id="verdict-text"></div>
  </div>

  <!-- Carte résultats -->
  <div class="results-card">
    <div class="results-card-header">
      <div class="results-site-name">KevinScale</div>
      <div id="flag-wrap" style="margin:14px auto 0;width:210px;height:126px;"></div>
      <div class="flag-label" id="flag-label"></div>
    </div>
    <div id="axes-list"></div>
  </div>

  <div class="results-actions">
    <button class="btn-action" onclick="sessionStorage.clear();location.href='index.html'">↺ Recommencer</button>
    <button class="btn-action" id="btn-copy" onclick="copyShare()">⎘ Copier le score</button>
    <button class="btn-action" onclick="downloadImage()">⬇ Télécharger l'image</button>
  </div>

</div>
</main>

<div id="ks-footer-placeholder"></div>

<script src="js/nav.js"></script>
<script src="js/questions.js"></script>
<script>
(function () {
  "use strict";

  const raw = sessionStorage.getItem("ks_scores");
  if (!raw) { window.location.href = "index.html"; return; }
  const scores = JSON.parse(raw);

  // Score global
  const globalScore = Math.round(AXES.reduce((s, a) => s + (scores[a.id] || 0), 0) / AXES.length);
  document.getElementById("global-score").textContent = globalScore;

  // Verdict
  const verdict = VERDICTS.find(v => globalScore >= v.min) || VERDICTS[VERDICTS.length - 1];
  document.getElementById("verdict-title").textContent = verdict.emoji + " " + verdict.title;
  document.getElementById("verdict-text").textContent  = verdict.text;

  // ── Drapeau ──────────────────────────────────────────────
  const top3 = [...AXES].sort((a, b) => (scores[b.id] || 0) - (scores[a.id] || 0)).slice(0, 3);
  const flagLabel = top3.map(a => a.label.split(" ")[0]).join(" · ");
  document.getElementById("flag-label").textContent = flagLabel;

  (function buildFlag() {
    const W = 210, H = 126, bh = H / 3;
    const svg = `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="border-radius:4px;overflow:hidden;display:block;">
      <rect x="0" y="0"       width="${W}" height="${bh}"   fill="${top3[0].color}"/>
      <rect x="0" y="${bh}"   width="${W}" height="${bh}"   fill="${top3[1].color}"/>
      <rect x="0" y="${bh*2}" width="${W}" height="${bh}"   fill="${top3[2].color}"/>
      <polygon points="0,0 ${W*0.38},${H/2} 0,${H}" fill="rgba(255,255,255,.9)"/>
    </svg>`;
    document.getElementById("flag-wrap").innerHTML = svg;
  })();

  // ── Barres axes ──────────────────────────────────────────
  const axesList = document.getElementById("axes-list");

  AXES.forEach((axis, idx) => {
    const prox = scores[axis.id] || 0;
    const row = document.createElement("div");
    row.className = "ps-axis-row";

    row.innerHTML = `
      <div class="ps-axis-meta">
        <span class="ps-axis-title">${axis.label.toUpperCase()}</span>
        <span class="ps-axis-pct">${prox}%</span>
      </div>
      <div class="ps-bar-simple-track">
        <div class="ps-bar-simple-fill" data-width="${prox}" style="background:${axis.color}">
          ${prox > 12 ? prox + "%" : ""}
        </div>
      </div>
    `;
    axesList.appendChild(row);

    // Animation entrée + barre
    setTimeout(() => {
      row.classList.add("visible");
      const fill = row.querySelector(".ps-bar-simple-fill");
      if (fill) fill.style.width = prox + "%";
    }, 150 + idx * 80);
  });

  // ── Copier score ─────────────────────────────────────────
  window.copyShare = function () {
    const text = `J'ai fait le KevinScale : ${globalScore}% de proximité avec Kévin — "${verdict.emoji} ${verdict.title}". Et toi ? https://kevinraphael95.github.io/kevinscale/`;
    navigator.clipboard?.writeText(text).then(() => {
      const btn = document.getElementById("btn-copy");
      const orig = btn.textContent;
      btn.textContent = "✓ Copié !";
      setTimeout(() => btn.textContent = orig, 2000);
    });
  };

  // ── Image téléchargeable ─────────────────────────────────
  window.downloadImage = function () {
    const W = 800, PAD = 36, HEADER_H = 56, FLAG_H = 130, ROW_H = 58;
    const H = HEADER_H + FLAG_H + 60 + 72 + AXES.length * ROW_H + 48;

    const canvas = document.createElement("canvas");
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext("2d");

    // Fond
    ctx.fillStyle = "#f4f2f7";
    ctx.fillRect(0, 0, W, H);

    // Header
    ctx.fillStyle = "#6a0dad";
    ctx.fillRect(0, 0, W, HEADER_H);
    ctx.fillStyle = "#fff";
    ctx.font = "bold 22px 'Arial', sans-serif";
    ctx.textAlign = "left";
    ctx.fillText("KevinScale", PAD, 34);
    ctx.font = "12px Arial, sans-serif";
    ctx.fillStyle = "rgba(255,255,255,.6)";
    ctx.textAlign = "right";
    ctx.fillText("kevinraphael95.github.io/kevinscale", W - PAD, 34);

    // Drapeau
    const FW = 190, FH = 114, FX = (W - FW) / 2, FY = HEADER_H + 18, bh = FH / 3;
    [top3[0].color, top3[1].color, top3[2].color].forEach((c, i) => {
      ctx.fillStyle = c;
      ctx.fillRect(FX, FY + i * bh, FW, bh);
    });
    ctx.fillStyle = "rgba(255,255,255,.88)";
    ctx.beginPath();
    ctx.moveTo(FX, FY);
    ctx.lineTo(FX + FW * 0.38, FY + FH / 2);
    ctx.lineTo(FX, FY + FH);
    ctx.closePath();
    ctx.fill();

    // Label drapeau
    ctx.fillStyle = "#888";
    ctx.font = "italic 15px Arial";
    ctx.textAlign = "center";
    ctx.fillText(flagLabel, W / 2, FY + FH + 18);

    // Verdict + score
    const VY = FY + FH + 46;
    ctx.fillStyle = "#111";
    ctx.font = "bold 20px Arial";
    ctx.textAlign = "left";
    ctx.fillText(`${verdict.emoji} ${verdict.title}`, PAD, VY);
    ctx.fillStyle = "#6a0dad";
    ctx.font = "bold 36px Arial";
    ctx.textAlign = "right";
    ctx.fillText(globalScore + "%", W - PAD, VY + 2);
    ctx.fillStyle = "#888";
    ctx.font = "12px Arial";
    ctx.fillText("de proximité avec Kévin", W - PAD, VY + 18);

    // Axes
    const AY = VY + 44, BAR_X = PAD + 190, BAR_W = W - BAR_X - PAD - 52, BAR_H = 24;
    AXES.forEach((axis, i) => {
      const prox = scores[axis.id] || 0;
      const ry = AY + i * ROW_H, barY = ry + 26;
      ctx.fillStyle = "#222";
      ctx.font = "bold 10px Arial";
      ctx.textAlign = "left";
      ctx.fillText(axis.label.toUpperCase(), PAD, barY + 15);
      ctx.fillStyle = "#ddd";
      roundRect(ctx, BAR_X, barY, BAR_W, BAR_H, 3); ctx.fill();
      const fillW = Math.max(4, (prox / 100) * BAR_W);
      ctx.fillStyle = axis.color;
      roundRect(ctx, BAR_X, barY, fillW, BAR_H, prox > 95 ? 3 : [3, 0, 0, 3]); ctx.fill();
      ctx.fillStyle = "#333";
      ctx.font = "bold 12px Arial";
      ctx.textAlign = "left";
      ctx.fillText(prox + "%", BAR_X + BAR_W + 8, barY + 16);
    });

    // Footer canvas
    ctx.fillStyle = "#aaa";
    ctx.font = "10px Arial";
    ctx.textAlign = "center";
    ctx.fillText("KevinScale · kevinraphael95.github.io/kevinscale", W / 2, H - 14);

    const link = document.createElement("a");
    link.download = "kevinscale-resultats.png";
    link.href = canvas.toDataURL("image/png");
    link.click();
  };

  function roundRect(ctx, x, y, w, h, r) {
    if (!Array.isArray(r)) r = [r, r, r, r];
    if (w <= 0) return;
    ctx.beginPath();
    ctx.moveTo(x + r[0], y);
    ctx.lineTo(x + w - r[1], y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r[1]);
    ctx.lineTo(x + w, y + h - r[2]);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r[2], y + h);
    ctx.lineTo(x + r[3], y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r[3]);
    ctx.lineTo(x, y + r[0]);
    ctx.quadraticCurveTo(x, y, x + r[0], y);
    ctx.closePath();
  }
})();
</script>

</body>
</html>
