<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drapeaux du Monde (API)</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
}

header {
  padding: 20px;
  text-align: center;
  background: linear-gradient(90deg, #1e3a8a, #9333ea);
}

.container {
  padding: 20px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
}

.card {
  background: #1e293b;
  border-radius: 15px;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
}

.card:hover {
  transform: scale(1.05);
  box-shadow: 0 10px 25px rgba(0,0,0,0.5);
}

.card img {
  width: 100%;
  height: 150px;
  object-fit: cover;
}

.card h2 {
  padding: 10px;
  font-size: 18px;
}

.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
  display: none;
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: #1e293b;
  padding: 20px;
  border-radius: 15px;
  max-width: 500px;
}

.close {
  float: right;
  cursor: pointer;
  font-size: 20px;
}

.search {
  margin-top: 10px;
  padding: 10px;
  width: 80%;
  border-radius: 8px;
  border: none;
}
</style>
</head>
<body>

<header>
  <h1>🌍 Drapeaux du Monde</h1>
  <p>API en temps réel (REST Countries)</p>
  <input class="search" id="search" placeholder="Rechercher un pays..." />
</header>

<div class="container" id="flags"></div>

<div class="modal" id="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">✖</span>
    <h2 id="title"></h2>
    <img id="flagImg" style="width:100%; border-radius:10px;" />
    <p id="desc"></p>
  </div>
</div>

<script>
let countries = [];

async function fetchCountries() {
  const res = await fetch("https://restcountries.com/v3.1/all?fields=name,flags,capital,population,region,languages")
  const data = await res.json();

  countries = data;
  render(data);
}

function render(list) {
  const container = document.getElementById("flags");
  container.innerHTML = "";

  list.slice(0, 100).forEach(c => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src="${c.flags.png}" />
      <h2>${c.name.common}</h2>
    `;

    card.onclick = () => openModal(c);
    container.appendChild(card);
  });
}

function openModal(c) {
  document.getElementById("modal").style.display = "flex";
  document.getElementById("title").innerText = c.name.common;
  document.getElementById("flagImg").src = c.flags.png;

  document.getElementById("desc").innerText =
    "Capitale : " + (c.capital ? c.capital[0] : "N/A") + "\n" +
    "Population : " + c.population.toLocaleString() + "\n" +
    "Région : " + c.region + "\n" +
    "Langues : " + (c.languages ? Object.values(c.languages).join(", ") : "N/A");
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

// recherche

document.getElementById("search").addEventListener("input", (e) => {
  const value = e.target.value.toLowerCase();

  const filtered = countries.filter(c =>
    c.name.common.toLowerCase().includes(value)
  );

  render(filtered);
});

fetchCountries();
</script>

</body>
</html>
