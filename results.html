<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KevinScale — Résultats</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <div id="header">
    <div class="headerLeft">
      <a href="index.html" title="Accueil"><i class="fa fa-home"></i></a>
    </div>
    <div class="headerMiddle">
      <h1><a href="index.html">KevinScale</a></h1>
    </div>
    <div class="headerRight"></div>
  </div>
</header>

<div class="results-wrap">

  <p class="results-intro">
    Votre résultat KevinScale est décomposé en <strong>8 axes</strong>.
    Chaque barre indique votre proximité idéologique avec Kévin de 0 à 100%.
  </p>

  <div class="global-score-line">
    <div class="global-score-num"><span id="global-score">—</span><span style="font-size:1.8rem">%</span></div>
    <span class="global-score-lbl">de proximité idéologique avec Kévin</span>
  </div>

  <div class="verdict-title" id="verdict-title"></div>
  <div class="verdict-text"  id="verdict-text"></div>

  <!-- Carte résultats style PolitiScales -->
  <div class="results-card">
    <div class="results-card-header">
      <div class="results-site-name">KevinScale</div>
      <!-- Drapeau SVG -->
      <div id="flag-wrap" style="margin:16px auto 4px;width:220px;height:132px;"></div>
      <div id="flag-label" style="text-align:center;font-style:italic;font-size:1rem;color:#555;margin-bottom:16px;"></div>
    </div>
    <div id="axes-list"></div>
  </div>

  <div class="results-actions">
    <button class="btn-action" onclick="location.href='index.html'">↺ Recommencer</button>
    <button class="btn-action" id="btn-copy" onclick="copyShare()">⎘ Copier le score</button>
    <button class="btn-action" onclick="downloadImage()">⬇ Télécharger l'image</button>
  </div>

</div>

<footer>
  Un test inspiré de <a href="https://politiscales.fr" target="_blank">PolitiScales</a>. Résultats calculés localement · Aucune donnée collectée.
</footer>

<script src="questions.js"></script>
<script>
(function() {
  "use strict";

  const raw = sessionStorage.getItem("ks_scores");
  if (!raw) { window.location.href = "index.html"; return; }
  const scores = JSON.parse(raw);

  // Score global = moyenne des proximités
  const global = Math.round(AXES.reduce((s, a) => s + (scores[a.id] || 0), 0) / AXES.length);
  document.getElementById("global-score").textContent = global;

  const verdict = VERDICTS.find(v => global >= v.min) || VERDICTS[VERDICTS.length - 1];
  document.getElementById("verdict-title").textContent = verdict.emoji + " " + verdict.title;
  document.getElementById("verdict-text").textContent  = verdict.text;

  // ── Drapeau : 3 axes avec la plus haute proximité ────────
  const top3 = [...AXES].sort((a, b) => (scores[b.id]||0) - (scores[a.id]||0)).slice(0, 3);
  const flagLabel = top3.map(a => a.label.split(" ")[0]).join(" · ");
  document.getElementById("flag-label").textContent = flagLabel;

  (function buildFlag() {
    const W = 220, H = 132;
    const bh = H / 3;
    const svg = `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
      <rect x="0" y="0"       width="${W}" height="${bh}"   fill="${top3[0].color}"/>
      <rect x="0" y="${bh}"   width="${W}" height="${bh}"   fill="${top3[1].color}"/>
      <rect x="0" y="${bh*2}" width="${W}" height="${bh}"   fill="${top3[2].color}"/>
      <polygon points="0,0 ${W*0.42},${H/2} 0,${H}" fill="#ffffff"/>
    </svg>`;
    document.getElementById("flag-wrap").innerHTML = svg;
  })();

  // ── Barres par axe style PolitiScales ───────────────────
  // Chaque barre = [% proche] [% neutre] [% opposé]
  // Proche = score, Opposé = 100-score, Neutre = zone centrale
  const axesList = document.getElementById("axes-list");

  AXES.forEach((axis, idx) => {
    const prox  = scores[axis.id] || 50;
    const oppos = 100 - prox;
    // Zone neutre : on compresse les extrêmes vers le centre
    const spread   = Math.abs(prox - 50);          // 0=neutre, 50=max tranché
    const neutralW = Math.max(10, 40 - spread);    // 10–40%
    const proxW    = Math.round((prox  / 100) * (100 - neutralW));
    const opposW   = Math.round((oppos / 100) * (100 - neutralW));
    const neutW    = 100 - proxW - opposW;

    const row = document.createElement("div");
    row.className = "ps-axis-row";
    row.style.cssText = "opacity:0;transform:translateY(8px);transition:opacity .4s ease,transform .4s ease;";

    row.innerHTML = `
      <div class="ps-axis-meta">
        <span class="ps-axis-near">Proche Kévin</span>
        <span class="ps-axis-title">${axis.label.toUpperCase()}</span>
        <span class="ps-axis-far">Opposé</span>
      </div>
      <div class="ps-bar-row">
        <div class="ps-seg ps-seg-prox"  style="width:${proxW}%;background:${axis.color}">
          ${proxW > 7 ? proxW + "%" : ""}
        </div>
        <div class="ps-seg ps-seg-neut"  style="width:${neutW}%">
          ${neutW > 7 ? neutW + "%" : ""}
        </div>
        <div class="ps-seg ps-seg-oppos" style="width:${opposW}%;background:${axis.color};opacity:.3">
          ${opposW > 7 ? opposW + "%" : ""}
        </div>
      </div>
    `;
    axesList.appendChild(row);

    setTimeout(() => {
      row.style.opacity = "1";
      row.style.transform = "translateY(0)";
    }, 200 + idx * 70);
  });

  // ── Copier score ─────────────────────────────────────────
  window.copyShare = function() {
    const text = `J'ai fait le KevinScale : ${global}% de proximité avec Kévin — "${verdict.emoji} ${verdict.title}". Et toi ? https://kevinraphael95.github.io/tst/`;
    navigator.clipboard?.writeText(text).then(() => {
      const btn = document.getElementById("btn-copy");
      const orig = btn.textContent;
      btn.textContent = "✓ Copié !";
      setTimeout(() => btn.textContent = orig, 2000);
    });
  };

  // ── Image téléchargeable — style PolitiScales ────────────
  window.downloadImage = function() {
    const W      = 800;
    const PAD    = 36;
    const HEADER = 56;
    const FLAG_H = 148;
    const ROW_H  = 62;
    const H      = HEADER + FLAG_H + 50 + 70 + AXES.length * ROW_H + 48;

    const canvas = document.createElement("canvas");
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext("2d");

    // Fond gris clair — identique PolitiScales
    ctx.fillStyle = "#ebebeb";
    ctx.fillRect(0, 0, W, H);

    // Header violet
    ctx.fillStyle = "#6a0dad";
    ctx.fillRect(0, 0, W, HEADER);
    ctx.fillStyle = "#fff";
    ctx.font = "bold 24px Arial, sans-serif";
    ctx.textAlign = "left";
    ctx.fillText("KevinScale", PAD, 35);
    ctx.font = "13px Arial, sans-serif";
    ctx.fillStyle = "rgba(255,255,255,.7)";
    ctx.textAlign = "right";
    ctx.fillText("kevinraphael95.github.io/tst", W - PAD, 35);

    // Drapeau centré
    const FW = 200, FH = 120;
    const FX = (W - FW) / 2, FY = HEADER + 20;
    const bh = FH / 3;

    // Bandes
    [top3[0].color, top3[1].color, top3[2].color].forEach((c, i) => {
      ctx.fillStyle = c;
      ctx.fillRect(FX, FY + i * bh, FW, bh);
    });
    // Triangle blanc
    ctx.fillStyle = "#fff";
    ctx.beginPath();
    ctx.moveTo(FX, FY);
    ctx.lineTo(FX + FW * 0.42, FY + FH / 2);
    ctx.lineTo(FX, FY + FH);
    ctx.closePath();
    ctx.fill();

    // Label drapeau
    ctx.fillStyle = "#444";
    ctx.font = "italic 17px Arial, sans-serif";
    ctx.textAlign = "center";
    ctx.fillText(flagLabel, W / 2, FY + FH + 22);

    // Verdict + score
    const VY = FY + FH + 50;
    ctx.fillStyle = "#111";
    ctx.font = "bold 22px Arial, sans-serif";
    ctx.textAlign = "left";
    ctx.fillText(`${verdict.emoji} ${verdict.title}`, PAD, VY);
    ctx.fillStyle = "#6a0dad";
    ctx.font = "bold 38px Arial, sans-serif";
    ctx.textAlign = "right";
    ctx.fillText(global + "%", W - PAD, VY + 2);
    ctx.fillStyle = "#666";
    ctx.font = "13px Arial, sans-serif";
    ctx.textAlign = "right";
    ctx.fillText("de proximité avec Kévin", W - PAD, VY + 20);

    // Axes
    const AY   = VY + 46;
    const BAR_X = PAD + 170;
    const BAR_W = W - BAR_X - PAD;
    const BAR_H = 26;

    AXES.forEach((axis, i) => {
      const prox  = scores[axis.id] || 50;
      const oppos = 100 - prox;
      const spread   = Math.abs(prox - 50);
      const neutralW = Math.max(10, 40 - spread);
      const proxW    = Math.round((prox  / 100) * (100 - neutralW));
      const opposW   = Math.round((oppos / 100) * (100 - neutralW));
      const neutW    = 100 - proxW - opposW;

      const ry   = AY + i * ROW_H;
      const barY = ry + 28;

      // Nom axe à gauche
      ctx.fillStyle = "#555";
      ctx.font = "11px Arial, sans-serif";
      ctx.textAlign = "left";
      ctx.fillText("Proche Kévin", PAD, barY - 8);
      ctx.fillStyle = "#222";
      ctx.font = "bold 12px Arial, sans-serif";
      ctx.textAlign = "center";
      ctx.fillText(axis.label.toUpperCase(), PAD + 80, barY + 14);

      const lw = (proxW / 100) * BAR_W;
      const nw = (neutW / 100) * BAR_W;
      const rw = (opposW / 100) * BAR_W;

      // Barre proximité
      ctx.fillStyle = axis.color;
      roundRect(ctx, BAR_X, barY, lw, BAR_H, [3, 0, 0, 3]);
      ctx.fill();
      if (proxW > 7) {
        ctx.fillStyle = "#fff";
        ctx.font = "bold 12px Arial";
        ctx.textAlign = "center";
        ctx.fillText(proxW + "%", BAR_X + lw / 2, barY + 17);
      }

      // Barre neutre
      ctx.fillStyle = "#c0c0c0";
      ctx.fillRect(BAR_X + lw, barY, nw, BAR_H);
      if (neutW > 7) {
        ctx.fillStyle = "#777";
        ctx.font = "12px Arial";
        ctx.textAlign = "center";
        ctx.fillText(neutW + "%", BAR_X + lw + nw / 2, barY + 17);
      }

      // Barre opposé (délavée)
      ctx.globalAlpha = 0.35;
      ctx.fillStyle = axis.color;
      roundRect(ctx, BAR_X + lw + nw, barY, rw, BAR_H, [0, 3, 3, 0]);
      ctx.fill();
      ctx.globalAlpha = 1;
      if (opposW > 7) {
        ctx.fillStyle = "#fff";
        ctx.font = "bold 12px Arial";
        ctx.textAlign = "center";
        ctx.fillText(opposW + "%", BAR_X + lw + nw + rw / 2, barY + 17);
      }
    });

    // Footer
    ctx.fillStyle = "#aaa";
    ctx.font = "11px Arial";
    ctx.textAlign = "center";
    ctx.fillText("KevinScale · kevinraphael95.github.io/tst · Résultats calculés localement", W / 2, H - 14);

    const link = document.createElement("a");
    link.download = "kevinscale-resultats.png";
    link.href = canvas.toDataURL("image/png");
    link.click();
  };

  function roundRect(ctx, x, y, w, h, r) {
    if (!Array.isArray(r)) r = [r, r, r, r];
    if (w <= 0) return;
    ctx.beginPath();
    ctx.moveTo(x + r[0], y);
    ctx.lineTo(x + w - r[1], y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r[1]);
    ctx.lineTo(x + w, y + h - r[2]);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r[2], y + h);
    ctx.lineTo(x + r[3], y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r[3]);
    ctx.lineTo(x, y + r[0]);
    ctx.quadraticCurveTo(x, y, x + r[0], y);
    ctx.closePath();
  }

})();
</script>

</body>
</html>
